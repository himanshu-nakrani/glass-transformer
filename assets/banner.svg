<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 400" width="1280" height="400" role="img" aria-labelledby="title desc">
  <title id="title">The Glass Transformer</title>
  <desc id="desc">A real micro-GPT with glass walls. Residual stream, causal attention, live sampling — computed in the browser.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b0c11"/>
      <stop offset="100%" stop-color="#06070a"/>
    </linearGradient>
    <linearGradient id="stage" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#151821"/>
      <stop offset="100%" stop-color="#0e1016"/>
    </linearGradient>
    <linearGradient id="hair" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffb347" stop-opacity="0"/>
      <stop offset="25%" stop-color="#ffb347" stop-opacity=".55"/>
      <stop offset="75%" stop-color="#ffb347" stop-opacity=".55"/>
      <stop offset="100%" stop-color="#ffb347" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff" stop-opacity=".055"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="rail" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5ad1c8" stop-opacity="0"/>
      <stop offset="18%" stop-color="#5ad1c8" stop-opacity=".75"/>
      <stop offset="52%" stop-color="#b18cff" stop-opacity=".9"/>
      <stop offset="82%" stop-color="#ffb347" stop-opacity=".75"/>
      <stop offset="100%" stop-color="#ffb347" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="em" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffb347"/>
      <stop offset="100%" stop-color="#ff8c42"/>
    </linearGradient>
    <linearGradient id="chip" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1d26"/>
      <stop offset="100%" stop-color="#12141b"/>
    </linearGradient>
    <radialGradient id="gv" cx="90%" cy="12%" r="40%">
      <stop offset="0%" stop-color="#b18cff" stop-opacity=".13"/>
      <stop offset="100%" stop-color="#b18cff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gc" cx="10%" cy="90%" r="36%">
      <stop offset="0%" stop-color="#5ad1c8" stop-opacity=".08"/>
      <stop offset="100%" stop-color="#5ad1c8" stop-opacity="0"/>
    </radialGradient>
    <filter id="g" x="-140%" y="-140%" width="380%" height="380%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="s" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- map geometry: panel x=628 w=596
         heatmap col ~648–742 | spine x=764 | cards x=792 w=400 -->
    <path id="spine" d="M 764 92 V 328"/>

    <style><![CDATA[
      .m{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace}
      .s{font-family:Georgia,'Iowan Old Style','Times New Roman',Times,serif}

      .live{animation:live 2.4s ease-in-out infinite}
      @keyframes live{0%,100%{opacity:1}50%{opacity:.3}}

      .flow{stroke-dasharray:5 11;animation:flow 3.5s linear infinite}
      @keyframes flow{to{stroke-dashoffset:-32}}

      .p{animation:pf 5.5s ease-in-out infinite}
      .p2{animation-delay:-2.75s}
      @keyframes pf{0%,100%{opacity:0}12%,88%{opacity:1}}

      .cur{animation:cur 1.05s steps(1) infinite}
      @keyframes cur{50%{opacity:0}}

      .hi{animation:hi 3.8s ease-in-out infinite}
      @keyframes hi{0%,100%{opacity:.75}45%,55%{opacity:1}}

      @media (prefers-reduced-motion:reduce){
        .live,.flow,.p,.p2,.cur,.hi{animation:none!important}
        .p,.p2{opacity:.9}
        .cur,.hi{opacity:1}
      }
    ]]></style>
  </defs>

  <!-- page -->
  <rect width="1280" height="400" fill="url(#bg)"/>
  <rect width="1280" height="400" fill="url(#gv)"/>
  <rect width="1280" height="400" fill="url(#gc)"/>

  <!-- stage card -->
  <rect x="28" y="22" width="1224" height="356" rx="14" fill="url(#stage)" stroke="#2a2e3a"/>
  <rect x="28" y="22" width="1224" height="356" rx="14" fill="url(#glass)"/>
  <rect x="80" y="22.5" width="1120" height="1" fill="url(#hair)"/>

  <!-- column divider (subtle) -->
  <line x1="600" y1="48" x2="600" y2="352" stroke="#2a2e3a" stroke-opacity=".55"/>

  <!-- ════════ LEFT ════════ -->
  <g transform="translate(64, 56)">
    <!-- kicker -->
    <circle class="live" cx="5" cy="1" r="3.5" fill="#c3e88d" filter="url(#s)"/>
    <text class="m" x="18" y="5" fill="#a49f92" font-size="10.5" letter-spacing="2.8">LIVE MODEL · COMPUTED IN YOUR BROWSER</text>

    <!-- title — tighter leading -->
    <text class="s" x="0" y="58" fill="#ece7da" font-size="50" font-weight="700" letter-spacing="-1.5">The Glass</text>
    <text class="s" x="0" y="108" fill="url(#em)" font-size="50" font-style="italic" font-weight="400" letter-spacing="-1.1">Transformer</text>

    <line x1="0" y1="126" x2="48" y2="126" stroke="#ffb347" stroke-opacity=".6" stroke-width="1.5" stroke-linecap="round"/>

    <!-- pitch -->
    <text class="m" x="0" y="154" fill="#a49f92" font-size="13.5">
      <tspan x="0" dy="0">Not a diagram about transformers.</tspan>
      <tspan x="0" dy="22">A transformer you can open.</tspan>
    </text>

    <!-- stats -->
    <g transform="translate(0, 204)" class="m" font-size="11">
      <rect x="0" y="-15" width="70" height="30" rx="6" fill="url(#chip)" stroke="#2a2e3a"/>
      <text x="35" y="5" text-anchor="middle" fill="#5ad1c8" letter-spacing="1.2">2L</text>

      <rect x="78" y="-15" width="70" height="30" rx="6" fill="url(#chip)" stroke="#2a2e3a"/>
      <text x="113" y="5" text-anchor="middle" fill="#b18cff" letter-spacing="1.2">2H</text>

      <rect x="156" y="-15" width="78" height="30" rx="6" fill="url(#chip)" stroke="#2a2e3a"/>
      <text x="195" y="5" text-anchor="middle" fill="#ffb347" letter-spacing="1">D=16</text>

      <rect x="242" y="-15" width="108" height="30" rx="6" fill="url(#chip)" stroke="#2a2e3a"/>
      <text x="296" y="5" text-anchor="middle" fill="#ff6b8a" letter-spacing=".4">7,568 P</text>
    </g>

    <!-- console ticker -->
    <g transform="translate(0, 248)">
      <rect x="0" y="0" width="500" height="56" rx="8" fill="#0a0b0f" stroke="#222632"/>
      <rect x="0" y="0" width="3" height="56" rx="1.5" fill="#c3e88d"/>
      <text class="m" x="16" y="18" fill="#5a564c" font-size="8.5" letter-spacing="1.8">SENTENCE</text>

      <g class="m" font-size="12" text-anchor="middle" transform="translate(16, 26)">
        <g transform="translate(0,0)">
          <rect width="50" height="24" rx="5" fill="#13151c" stroke="#7aa2ff" stroke-opacity=".5"/>
          <text x="25" y="16" fill="#7aa2ff">the</text>
        </g>
        <g transform="translate(56,0)">
          <rect width="50" height="24" rx="5" fill="#13151c" stroke="#5ad1c8" stroke-opacity=".55"/>
          <text x="25" y="16" fill="#5ad1c8">cat</text>
        </g>
        <g transform="translate(112,0)">
          <rect width="48" height="24" rx="5" fill="#13151c" stroke="#ff6b8a" stroke-opacity=".55"/>
          <text x="24" y="16" fill="#ff6b8a">sat</text>
        </g>
        <g transform="translate(166,0)">
          <rect width="42" height="24" rx="5" fill="#13151c" stroke="#ffb347" stroke-opacity=".5"/>
          <text x="21" y="16" fill="#ffb347">on</text>
        </g>
        <g transform="translate(214,0)">
          <rect width="50" height="24" rx="5" fill="#13151c" stroke="#7aa2ff" stroke-opacity=".5"/>
          <text x="25" y="16" fill="#7aa2ff">the</text>
        </g>
        <g transform="translate(270,0)">
          <rect width="52" height="24" rx="5" fill="#13151c" stroke="#5ad1c8" stroke-opacity=".6"/>
          <text x="26" y="16" fill="#5ad1c8">mat</text>
        </g>
        <g transform="translate(330,0)">
          <rect width="24" height="24" rx="5" fill="#0c0e14" stroke="#c3e88d" stroke-opacity=".45" stroke-dasharray="3 2"/>
          <rect class="cur" x="9" y="5" width="6" height="14" fill="#ffb347" rx="1"/>
        </g>
      </g>
    </g>

    <!-- caption under console — readable, not ghost -->
    <text class="m" x="0" y="328" fill="#6e6a60" font-size="10" letter-spacing="1.6">EVERY NUMBER IS GENUINELY COMPUTED</text>
  </g>

  <!-- ════════ RIGHT MAP ════════
       3-col grid inside panel (628,48 596×308):
         [ heatmap 96 ] [ spine 28 ] [ cards 420 ]
  -->
  <g>
    <rect x="628" y="48" width="596" height="308" rx="10" fill="#0a0b0f" stroke="#222632"/>

    <text class="m" x="648" y="70" fill="#5a564c" font-size="9" letter-spacing="2.4">RESIDUAL STREAM</text>
    <text class="m" x="1200" y="70" text-anchor="end" fill="#5a564c" font-size="9" letter-spacing="1.6">MAP</text>

    <!-- spine: x=764, from first node to last (y=108…312) -->
    <use href="#spine" fill="none" stroke="#141820" stroke-width="6" stroke-linecap="round"/>
    <use href="#spine" fill="none" stroke="#2a2e3a" stroke-width="1.25" stroke-linecap="round"/>
    <use href="#spine" class="flow" fill="none" stroke="url(#rail)" stroke-width="1.8" stroke-linecap="round" filter="url(#s)"/>

    <circle class="p" r="3.4" fill="#5ad1c8" filter="url(#g)">
      <animateMotion dur="5.5s" repeatCount="indefinite" path="M 764 92 V 328"/>
    </circle>
    <circle class="p p2" r="3" fill="#ffb347" filter="url(#g)">
      <animateMotion dur="5.5s" begin="-2.75s" repeatCount="indefinite" path="M 764 92 V 328"/>
    </circle>

    <!-- heatmap: left column, vertically centered on the stack -->
    <g transform="translate(648, 148)">
      <text class="m" x="0" y="0" fill="#5a564c" font-size="8" letter-spacing="1.1">L1 · POSITION</text>
      <g transform="translate(0, 12)">
        <!-- 5×5 causal lower triangle, cell=12 gap=2 → 68×68 -->
        <rect width="12" height="12" rx="2" fill="#ffb347" opacity=".95"/>
        <rect y="14" width="12" height="12" rx="2" fill="#ffb347" opacity=".28"/>
        <rect x="14" y="14" width="12" height="12" rx="2" fill="#ffb347" opacity=".95"/>
        <rect y="28" width="12" height="12" rx="2" fill="#3a2a12"/>
        <rect x="14" y="28" width="12" height="12" rx="2" fill="#ffb347" opacity=".68"/>
        <rect x="28" y="28" width="12" height="12" rx="2" fill="#ffb347" opacity=".95"/>
        <rect y="42" width="12" height="12" rx="2" fill="#3a2a12"/>
        <rect x="14" y="42" width="12" height="12" rx="2" fill="#ffb347" opacity=".3"/>
        <rect x="28" y="42" width="12" height="12" rx="2" fill="#ffb347" opacity=".68"/>
        <rect x="42" y="42" width="12" height="12" rx="2" fill="#ffb347" opacity=".95"/>
        <rect y="56" width="12" height="12" rx="2" fill="#3a2a12"/>
        <rect x="14" y="56" width="12" height="12" rx="2" fill="#ffb347" opacity=".2"/>
        <rect x="28" y="56" width="12" height="12" rx="2" fill="#ffb347" opacity=".38"/>
        <rect x="42" y="56" width="12" height="12" rx="2" fill="#ffb347" opacity=".75"/>
        <rect x="56" y="56" width="12" height="12" rx="2" fill="#ffb347" opacity=".95"/>
      </g>
      <text class="m" x="0" y="96" fill="#4a463e" font-size="7.5" letter-spacing=".6">CAUSAL · Δ=1</text>
    </g>

    <!--
      Nodes: equal spacing step=40.8 ≈ 41
      y centers: 108, 149, 190, 231, 272, 313
      spine dots at same y; stub 764→792; cards 792×400, h=34
    -->
    <g class="m">
      <!-- TOKENIZE -->
      <g transform="translate(792, 108)">
        <line x1="-28" y1="0" x2="0" y2="0" stroke="#2a2e3a" stroke-width="1"/>
        <circle cx="-28" cy="0" r="4" fill="#0a0b0f" stroke="#5ad1c8" stroke-width="1.4"/>
        <rect x="0" y="-17" width="400" height="34" rx="5" fill="#13151c" stroke="#2a2e3a"/>
        <text x="14" y="0" fill="#ece7da" font-size="12" font-weight="600">TOKENIZE</text>
        <text x="14" y="13" fill="#6e6a60" font-size="9">vocab IDs</text>
      </g>

      <!-- EMBED -->
      <g transform="translate(792, 149)">
        <line x1="-28" y1="0" x2="0" y2="0" stroke="#2a2e3a" stroke-width="1"/>
        <circle cx="-28" cy="0" r="4" fill="#0a0b0f" stroke="#3a4050" stroke-width="1.4"/>
        <rect x="0" y="-17" width="400" height="34" rx="5" fill="#13151c" stroke="#2a2e3a"/>
        <text x="14" y="0" fill="#ece7da" font-size="12" font-weight="600">EMBED + POSITION</text>
        <text x="14" y="13" fill="#6e6a60" font-size="9">16-d · sinusoids</text>
      </g>

      <!-- ATTN L1 active — amber pulse sits on this row -->
      <g class="hi" transform="translate(792, 190)">
        <line x1="-28" y1="0" x2="0" y2="0" stroke="#ffb347" stroke-opacity=".45" stroke-width="1.2"/>
        <circle cx="-28" cy="0" r="4.5" fill="#ffb347" filter="url(#s)"/>
        <rect x="0" y="-17" width="400" height="34" rx="5" fill="#1c1810" stroke="#ffb347" stroke-opacity=".7"/>
        <text x="14" y="0" fill="#ffb347" font-size="12" font-weight="600">BLOCK 1 · ATTENTION</text>
        <text x="14" y="13" fill="#9a8560" font-size="9">position · content</text>
      </g>

      <!-- MLP -->
      <g transform="translate(792, 231)">
        <line x1="-28" y1="0" x2="0" y2="0" stroke="#2a2e3a" stroke-width="1"/>
        <circle cx="-28" cy="0" r="4" fill="#0a0b0f" stroke="#b18cff" stroke-opacity=".65" stroke-width="1.4"/>
        <rect x="0" y="-17" width="400" height="34" rx="5" fill="#13151c" stroke="#2a2e3a"/>
        <text x="14" y="0" fill="#ece7da" font-size="12" font-weight="600">BLOCK 1 · MLP</text>
        <text x="14" y="13" fill="#6e6a60" font-size="9">16 → 64 → 16 · GELU</text>
      </g>

      <!-- ATTN L2 -->
      <g transform="translate(792, 272)">
        <line x1="-28" y1="0" x2="0" y2="0" stroke="#2a2e3a" stroke-width="1"/>
        <circle cx="-28" cy="0" r="4" fill="#0a0b0f" stroke="#5ad1c8" stroke-opacity=".65" stroke-width="1.4"/>
        <rect x="0" y="-17" width="400" height="34" rx="5" fill="#13151c" stroke="#5ad1c8" stroke-opacity=".45"/>
        <text x="14" y="0" fill="#5ad1c8" font-size="12" font-weight="600">BLOCK 2 · ATTENTION</text>
        <text x="14" y="13" fill="#6e6a60" font-size="9">recency · untrained</text>
      </g>

      <!-- SAMPLE -->
      <g transform="translate(792, 313)">
        <line x1="-28" y1="0" x2="0" y2="0" stroke="#2a2e3a" stroke-width="1"/>
        <circle cx="-28" cy="0" r="4" fill="#0a0b0f" stroke="#ff6b8a" stroke-opacity=".65" stroke-width="1.4"/>
        <rect x="0" y="-17" width="400" height="34" rx="5" fill="#13151c" stroke="#ff6b8a" stroke-opacity=".5"/>
        <text x="14" y="0" fill="#ff6b8a" font-size="12" font-weight="600">UNEMBED · SAMPLE</text>
        <text x="14" y="13" fill="#6e6a60" font-size="9">softmax → next token</text>
      </g>
    </g>
  </g>
</svg>
